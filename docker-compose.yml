version: "3.9"

services:
  web:
    build: .
    container_name: b2b_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./app:/code
    ports:
      - "8001:8000"
    depends_on:
      - db
    environment:
      - POSTGRES_DB=b2b_db
      - POSTGRES_USER=b2b_user
      - POSTGRES_PASSWORD=b2b_password
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432

  db:
    image: postgres:15
    container_name: b2b_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=b2b_db
      - POSTGRES_USER=b2b_user
      - POSTGRES_PASSWORD=b2b_password
    ports:
      - "5433:5432"

volumes:
  postgres_data:
