<nav aria-label="Page navigation">
    <ul class="pagination justify-content-center">

        {% if users.has_previous %}
            <li class="page-item">
                <a class="page-link"
                   href="?page={{ users.previous_page_number }}{% if query %}&{{ query }}{% endif %}">
                    이전
                </a>
            </li>
        {% else %}
            <li class="page-item disabled">
                <span class="page-link">이전</span>
            </li>
        {% endif %}

        {% for num in users.paginator.page_range %}
            {% if users.number == num %}
                <li class="page-item active">
                    <span class="page-link">{{ num }}</span>
                </li>
            {% else %}
                <li class="page-item">
                    <a class="page-link"
                       href="?page={{ num }}{% if query %}&{{ query }}{% endif %}">
                        {{ num }}
                    </a>
                </li>
            {% endif %}
        {% endfor %}

        {% if users.has_next %}
            <li class="page-item">
                <a class="page-link"
                   href="?page={{ users.next_page_number }}{% if query %}&{{ query }}{% endif %}">
                    다음
                </a>
            </li>
        {% else %}
            <li class="page-item disabled">
                <span class="page-link">다음</span>
            </li>
        {% endif %}

    </ul>
</nav>
